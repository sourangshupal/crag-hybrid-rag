# docker-compose.local.yml — Local dev stack for Mac M1 Pro (linux/arm64)
#
# Starts two services:
#   qdrant  — Qdrant vector database (native arm64 image)
#   app     — FastAPI app built from Dockerfile.local
#
# Usage:
#   docker compose -f docker-compose.local.yml up --build
#
# QDRANT_URL from .env is overridden here to use Docker's internal DNS
# so the app reaches the sibling qdrant container — no .env edits needed.
# Qdrant data persists in the named volume 'qdrant_storage' across restarts.

services:

  qdrant:
    image: qdrant/qdrant:latest
    platform: linux/arm64
    container_name: crag-qdrant
    ports:
      - "6333:6333"   # REST API (also serves the web dashboard at /dashboard)
      - "6334:6334"   # gRPC port
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      # Qdrant's minimal Debian image ships without curl/wget. Bash's built-in
      # /dev/tcp is available and sufficient to verify the port is accepting
      # connections (Qdrant starts serving HTTP almost instantly on port 6333).
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile.local
    platform: linux/arm64
    container_name: crag-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Docker Compose environment: overrides env_file: so the containerised app
      # talks to the local qdrant service, not Qdrant Cloud.
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=
      - UPLOAD_DIR=/var/app/uploads
    volumes:
      - app_uploads:/var/app/uploads
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      # python:3.12-slim-bookworm also ships without curl; use Python's stdlib instead.
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

volumes:
  qdrant_storage:
  app_uploads:
